<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #141414;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ── Escena 3D ── */
.scene {
  perspective: 700px;
  perspective-origin: 50% 45%;
  width: 100vw;
  height: 520px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.stage {
  position: relative;
  width: 260px;
  height: 420px;
  transform-style: preserve-3d;
}

/* ── Tarjeta base ── */
.card {
  position: absolute;
  width: 230px;
  height: 400px;
  left: 15px;
  top: 0;
  border-radius: 32px;
  transform-style: preserve-3d;
  will-change: transform, opacity;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(.25,.46,.45,.94),
              opacity   0.6s ease;
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 32px;
  border: 1.5px solid rgba(255,255,255,0.2);
  overflow: hidden;
}

/* Brillo interno tipo vidrio */
.card-face::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 32px;
  background: radial-gradient(
    ellipse 70% 55% at 38% 22%,
    rgba(255,255,255,0.30) 0%,
    rgba(255,255,255,0.06) 45%,
    transparent 70%
  );
  pointer-events: none;
  z-index: 2;
}

/* Destello borde inferior */
.card-face::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  border-radius: 0 0 32px 32px;
  z-index: 2;
}

/* Portada foto */
.card-cover {
  position: absolute;
  inset: 0;
  border-radius: 32px;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55) saturate(0.7);
}

/* Capa de color translúcida encima de la foto */
.card-color {
  position: absolute;
  inset: 0;
  border-radius: 32px;
  mix-blend-mode: color;
  opacity: 0.9;
}

/* Oscurecimiento degradado abajo */
.card-grad {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 55%;
  border-radius: 0 0 32px 32px;
  background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.65) 100%);
  z-index: 1;
}

/* Contenido de texto y controles */
.card-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px 20px 20px;
  z-index: 3;
}

.song-title {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 18px;
  color: rgba(255,255,255,0.93);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-artist {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 14px;
}

.prog-track {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 6px;
  position: relative;
}
.prog-fill {
  height: 100%;
  width: 0%;
  background: rgba(255,255,255,0.75);
  border-radius: 2px;
  transition: width 0.3s linear;
  pointer-events: none;
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute;
  right: -3px; top: 50%;
  transform: translateY(-50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fff;
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 16px;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 14px;
}

.ctrl {
  background: none; border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.4);
  display: flex; align-items: center; justify-content: center;
  padding: 4px;
  transition: color 0.2s;
}
.ctrl:hover { color: rgba(255,255,255,0.85); }

.play-btn {
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.28);
  cursor: pointer;
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.92);
  transition: background 0.2s, transform 0.15s;
}
.play-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
.play-btn:active { transform: scale(0.94); }

.bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.heart-btn {
  background: none; border: none;
  cursor: pointer;
  color: rgba(255,255,255,0.28);
  padding: 3px;
  display: flex;
  transition: color 0.2s;
}
.heart-btn.liked { color: #ff0000; }

.waves {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 13px;
}
.wave-bar {
  width: 2px;
  background: rgba(255,255,255,0.5);
  border-radius: 1px;
  animation: wave 0.9s ease-in-out infinite;
  animation-play-state: paused;
}
.wave-bar:nth-child(1){height:4px;  animation-delay:0s}
.wave-bar:nth-child(2){height:10px; animation-delay:.15s}
.wave-bar:nth-child(3){height:6px;  animation-delay:.3s}
.wave-bar:nth-child(4){height:12px; animation-delay:.1s}
.wave-bar:nth-child(5){height:3px;  animation-delay:.25s}

@keyframes wave {
  0%,100%{transform:scaleY(0.3)}
  50%{transform:scaleY(1)}
}

/* ── Dots ── */
.dots-row {
  margin-top: 24px;
  display: flex;
  gap: 7px;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: background .25s, transform .25s;
}
.dot.active { background: #fff; transform: scale(1.4); }

/* Fondo */
#bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  transition: background 0.9s ease;
}
root{
  --var-color1:#a855f7;
  --var-color2:#ff0077;
  --var-color3:#e4b950;
  --var-color4:#f0e3c3;
  --var-color5:#004da2;
  --var-color6:#ff0033;
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="scene">
  <div class="stage" id="stage"></div>
</div>

<div class="dots-row" id="dotsRow"></div>

<audio id="audio" preload="metadata"></audio>

<script>
/* ════════════════════════════════
   CANCIONES — edita con tus rutas
   color: color neón de cada tarjeta
════════════════════════════════ */


const songs = [
  { title:"Sabes qué te digo", artist:"Café Quijano", src:"audio/sabes_que_te_digo.mp3", cover:"img/paisaje.jpg", color:"#a855f7" },
  { title:"La Jamaicana", artist:"Café Quijano", src:"audio/La_jamaicana.mp3", cover:"img/La_Jamaicana.jpg", color:"#ff0077" },
  { title:"Perfume de Gardenias", artist:"La Sonora Santanera", src:"audio/Perfume_de_gardenias.mp3", cover:"img/Perfume_de_gardenias.jpg", color:"#e4b950" },
  { title:"Californica", artist:"La Gusana Ciega", src:"audio/Californica.mp3", cover:"img/Californica.jpg", color:"#f0e3c3" },
  { title:"The Way You Make Me Feel", artist:" Michael Jackson", src:"audio/The_way_you_make_me_feel.mp3", cover:"img/The_way_you_make_me_feel.jpg", color:"#004da2" },
];

const audio  = document.getElementById('audio');
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dotsRow');
const bg     = document.getElementById('bg');

let current   = 0;
let isPlaying = false;
let volume    = 0.7;
let liked     = new Set();

/* ══════════════════════════════════════
   Calcula posición 3D de cada tarjeta
   relativa al índice central
══════════════════════════════════════ */
function cardTransform(offset, dragProgress) {
  /* dragProgress: -1 → 1 durante el arrastre */
  const o = offset - dragProgress;
  const absO = Math.abs(o);

  /* Separación lateral */
  const tx = o * 155;

  /* Las tarjetas laterales se "caen" hacia atrás y se inclinan */
  const tz   = -absO * 90;
  /* Inclinación: las de la izquierda rotan + y las de la derecha − */
  const ry   = -Math.sign(o) * Math.min(absO, 2) * 32;
  /* También se inclinan un poco en Z para dar profundidad */
  const rz   = Math.sign(o) * Math.min(absO, 2) * 4;

  const sc   = Math.max(0.72, 1 - absO * 0.13);
  const op   = Math.max(0,    1 - absO * 0.38);
  const blur = Math.max(0, absO - 0.5) * 3;

  return { tx, tz, ry, rz, sc, op, blur };
}

function applyTransform(card, offset, dragProgress = 0, animate = true) {
  const { tx, tz, ry, rz, sc, op, blur } = cardTransform(offset, dragProgress);
  card.style.transition = animate
    ? 'transform 0.58s cubic-bezier(.25,.46,.45,.94), opacity 0.58s ease, filter 0.58s ease'
    : 'none';
  card.style.transform = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) rotateZ(${rz}deg) scale(${sc})`;
  card.style.opacity   = op;
  card.style.zIndex    = Math.round(100 - Math.abs(offset - dragProgress) * 10);
  card.style.filter    = blur > 0 ? `blur(${blur}px)` : 'none';
  card.style.pointerEvents = Math.abs(offset) <= 1 ? 'auto' : 'none';
}

/* ══════════════════════════════════════
   Construye todas las tarjetas
══════════════════════════════════════ */
function build() {
  stage.innerHTML  = '';
  dotsEl.innerHTML = '';

  songs.forEach((s, i) => {
    const card = document.createElement('div');
    card.className  = 'card';
    card.dataset.idx = i;

    card.innerHTML = `
      <div class="card-face">
        <div class="card-cover" style="background-image:url('${s.cover}')"></div>
        <div class="card-color" style="background:${s.color}"></div>
        <div class="card-grad"></div>
        <div class="card-content">
          <p class="song-title">${s.title}</p>
          <p class="song-artist">${s.artist}</p>
          <div class="prog-track" data-prog="${i}">
            <div class="prog-fill" id="prog-${i}"></div>
          </div>
          <div class="time-row">
            <span id="cur-${i}">0:00</span>
            <span id="dur-${i}">0:00</span>
          </div>
          <div class="controls">
            <button class="ctrl" data-action="prev" data-idx="${i}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
              </svg>
            </button>
            <button class="play-btn" id="playbtn-${i}" data-action="play" data-idx="${i}">
              <svg id="playicon-${i}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </button>
            <button class="ctrl" data-action="next" data-idx="${i}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
              </svg>
            </button>
          </div>
          <div class="bottom-row">
            <button class="heart-btn" id="heart-${i}" data-action="like" data-idx="${i}">
              <svg id="heartsvg-${i}" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
            <div class="waves" id="waves-${i}">
              <div class="wave-bar"></div><div class="wave-bar"></div>
              <div class="wave-bar"></div><div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
          </div>
        </div>
      </div>
    `;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className  = 'dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dotsEl.appendChild(dot);
  });

  layout(0, false);
  attachEvents();
}

/* ══ Posiciona todas las tarjetas relativo al centro ══ */
function layout(center, animate, dragProgress = 0) {
  stage.querySelectorAll('.card').forEach((card, i) => {
    applyTransform(card, i - center, dragProgress, animate);
  });
  dotsEl.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === center)
  );
  /* Fondo */
  const c = songs[center].color;
  const r = parseInt(c.slice(1,3),16);
  const g = parseInt(c.slice(3,5),16);
  const b = parseInt(c.slice(5,7),16);
  bg.style.background =
    `radial-gradient(ellipse 90% 55% at 50% 90%, rgba(${r},${g},${b},0.20) 0%, #141414 65%)`;
}

/* ══ Ir a canción ══ */
function goTo(idx, autoplay) {
  if (idx < 0 || idx >= songs.length) return;
  const wasPlaying = isPlaying;
  if (isPlaying) { audio.pause(); setPlayUI(current, false); }
  current = idx;
  layout(idx, true);
  audio.src    = songs[idx].src;
  audio.volume = volume;
  resetProg(idx);
  if (autoplay || wasPlaying) {
    audio.play().catch(()=>{});
    setPlayUI(idx, true);
    isPlaying = true;
  }
}

function resetProg(i) {
  const p = document.getElementById(`prog-${i}`);
  const c = document.getElementById(`cur-${i}`);
  const d = document.getElementById(`dur-${i}`);
  if(p) p.style.width='0%';
  if(c) c.textContent='0:00';
  if(d) d.textContent='0:00';
}

function setPlayUI(i, playing) {
  const icon  = document.getElementById(`playicon-${i}`);
  const waves = document.querySelectorAll(`#waves-${i} .wave-bar`);
  if(!icon) return;
  icon.innerHTML = playing
    ? '<line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
  waves.forEach(b => b.style.animationPlayState = playing ? 'running' : 'paused');
}

function togglePlay(i) {
  if (i !== current) { goTo(i, true); return; }
  if (audio.paused) {
    audio.play().catch(()=>{}); setPlayUI(i, true); isPlaying = true;
  } else {
    audio.pause(); setPlayUI(i, false); isPlaying = false;
  }
}

function toggleLike(i) {
  liked.has(i) ? liked.delete(i) : liked.add(i);
  const on = liked.has(i);
  document.getElementById(`heart-${i}`).classList.toggle('liked', on);
  const sv = document.getElementById(`heartsvg-${i}`);
  sv.setAttribute('fill',   on ? '#ff0033' : 'none');
  sv.setAttribute('stroke', on ? '#ff0033' : 'currentColor');
}

const fmt = s => Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');

audio.addEventListener('timeupdate', () => {
  if(!audio.duration) return;
  const p = document.getElementById(`prog-${current}`);
  const c = document.getElementById(`cur-${current}`);
  if(p) p.style.width = (audio.currentTime/audio.duration*100)+'%';
  if(c) c.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  const d = document.getElementById(`dur-${current}`);
  if(d) d.textContent = fmt(audio.duration);
});
audio.addEventListener('ended',  () => goTo((current+1)%songs.length, true));
audio.addEventListener('play',   () => { isPlaying=true;  setPlayUI(current,true);  });
audio.addEventListener('pause',  () => { isPlaying=false; setPlayUI(current,false); });

/* ══ Eventos en tarjetas ══ */
function attachEvents() {
  stage.addEventListener('click', e => {
    const btn  = e.target.closest('[data-action]');
    const card = e.target.closest('.card');
    if (!btn && card) {
      const i = parseInt(card.dataset.idx);
      if (i !== current) goTo(i, false);
      return;
    }
    if (!btn) return;
    const i   = parseInt(btn.dataset.idx);
    const act = btn.dataset.action;
    if (act === 'play') togglePlay(i);
    else if (act === 'next') goTo((i+1)%songs.length, isPlaying);
    else if (act === 'prev') {
      if (audio.currentTime > 3 && i === current) audio.currentTime = 0;
      else goTo((i-1+songs.length)%songs.length, isPlaying);
    }
    else if (act === 'like') toggleLike(i);
  });

  stage.querySelectorAll('[data-prog]').forEach(pt => {
    pt.addEventListener('click', e => {
      const i = parseInt(pt.dataset.prog);
      if (!audio.duration || i !== current) return;
      const r = pt.getBoundingClientRect();
      audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
    });
  });

  dotsEl.addEventListener('click', e => {
    const d = e.target.closest('.dot');
    if(d) goTo(parseInt(d.dataset.idx), false);
  });
}

/* ══════════════════════════════════════
   DRAG / SWIPE con animación continua
══════════════════════════════════════ */
let dragStart   = null;
let dragging    = false;
let dragProg    = 0;   /* -1..1 */
const DRAG_DIST = 180; /* px para avanzar una tarjeta completa */

function onDown(x) {
  dragStart = x;
  dragging  = true;
  dragProg  = 0;
}

function onMove(x) {
  if (!dragging || dragStart === null) return;
  const delta = x - dragStart;
  /* Normaliza: DRAG_DIST px = 1 tarjeta */
  dragProg = -delta / DRAG_DIST;
  /* Clamp para que no salte más de 1 tarjeta */
  dragProg = Math.max(-1, Math.min(1, dragProg));
  layout(current, false, dragProg);
}

function onUp() {
  if (!dragging) return;
  dragging = false;
  if      (dragProg >  0.35 && current < songs.length - 1) goTo(current + 1, false);
  else if (dragProg < -0.35 && current > 0)                goTo(current - 1, false);
  else layout(current, true, 0);  /* vuelve al centro */
  dragProg  = 0;
  dragStart = null;
}

const sceneEl = document.querySelector('.scene');
sceneEl.addEventListener('touchstart', e => onDown(e.touches[0].clientX), {passive:true});
sceneEl.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX); }, {passive:false});
sceneEl.addEventListener('touchend',   onUp);
sceneEl.addEventListener('touchcancel',onUp);
sceneEl.addEventListener('mousedown',  e => { onDown(e.clientX); e.preventDefault(); });
window.addEventListener('mousemove',   e => { if(dragging) onMove(e.clientX); });
window.addEventListener('mouseup',     onUp);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(Math.min(current+1, songs.length-1), false);
  if (e.key === 'ArrowLeft')  goTo(Math.max(current-1, 0), false);
});

build();
goTo(0, false);
</script>
</body>
</html>
